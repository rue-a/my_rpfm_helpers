# Custom notes appended to field descriptions in the schema lookup.
# Structure: table_name -> column_name -> note text
#
# Example:
#   battle_entities_tables:
#     fire_arc_close: "Your note here"

battle_entities_tables:
  fire_arc_close: "Defines the unit's firing arc visualization. Does not effect the actual firing arc. Might need to be defined on a `articulated_entity`."
land_units_tables:
  primary_ammo: "Ammunition amount"
  secondary_ammo: "???"
  primary_missile_weapon: "This does not actually change the weapon ingame. I think it just pulls the weapon stats for the UI. To change the weapon, one has to update the `battle_entity_stats` column in `battle_personalities_tables`."
  primary_melee_weapon: "This does not actually change the weapon ingame. I think it just pulls the weapon stats for the UI. To change the weapon, one has to update the `battle_entity_stats` column in `battle_personalities_tables`."
  num_engines: "Requires updating `num_men` in `main_units_tables`!"
main_units_tables:
  num_men: "Has to be adjusted to `num_engines` in `land_units_tables`. I don't know where the required number of men per engine is defined."
battle_personalities_tables:
  battle_entity_stats: "Defines the which weapons the entities use in battle (via `battle_entity_stats_tables`)."
projectiles_tables:
  contact_stat_effect: "To control the icon that appears beside the ranged attack in the unit stats (like with poison arrows), you need to add a PNG with the reference special ability phase's name in `ui/battle ui/ability_icons`. "